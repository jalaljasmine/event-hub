<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EventHub | Login</title>
    <link rel="stylesheet" href="style.css"/>
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .auth-card {
            background: #13131f;
            border: 1px solid #2a2a45;
            border-radius: 24px;
            padding: 36px 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .auth-logo { font-size:28px; font-weight:800; color:#00c9a7; text-align:center; margin-bottom:6px; }
        .auth-sub  { text-align:center; color:#666; font-size:13px; margin-bottom:28px; }
        .tab-row   { display:flex; background:#0d0d1a; border-radius:12px; padding:4px; margin-bottom:24px; gap:4px; }
        .tab-btn   { flex:1; padding:10px; border:none; border-radius:9px; font-weight:700; font-size:13px; cursor:pointer; transition:.2s; background:transparent; color:#666; }
        .tab-btn.active { background:linear-gradient(135deg,#ff6b35,#f72585); color:#fff; }
        .role-row  { display:flex; gap:10px; margin-bottom:20px; }
        .role-card { flex:1; padding:12px; border:2px solid #2a2a45; border-radius:12px; text-align:center; cursor:pointer; transition:.2s; }
        .role-card:hover { border-color:#00c9a7; }
        .role-card.selected { border-color:#00c9a7; background:rgba(0,201,167,0.08); }
        .role-icon { font-size:24px; margin-bottom:4px; }
        .role-label{ font-size:12px; font-weight:700; color:#aaa; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:12px; color:#888; margin-bottom:6px; font-weight:600; }
        .form-group input {
            width:100%; padding:12px 16px; background:#0d0d1a; border:1.5px solid #2a2a45;
            border-radius:10px; color:#fff; font-size:14px; outline:none; box-sizing:border-box;
            transition:.2s;
        }
        .form-group input:focus { border-color:#00c9a7; }
        .name-row  { display:flex; gap:10px; }
        .name-row .form-group { flex:1; }
        .btn-auth  { width:100%; padding:14px; background:linear-gradient(135deg,#00c9a7,#7b61ff); border:none; border-radius:12px; color:#fff; font-weight:800; font-size:15px; cursor:pointer; margin-top:8px; transition:.2s; }
        .btn-auth:hover { opacity:.9; transform:translateY(-1px); }
        .err-msg   { color:#ff4d6d; font-size:13px; text-align:center; margin-top:10px; display:none; }
        .back-link { text-align:center; margin-top:18px; font-size:13px; color:#666; }
        .back-link a { color:#00c9a7; text-decoration:none; font-weight:700; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">EventHub</div>
    <div class="auth-sub">Vijayawada's #1 Event Platform</div>

    <div class="tab-row">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- ROLE SELECTION -->
    <div class="role-row">
        <div class="role-card selected" id="roleAttendee" onclick="selectRole('attendee')">
            <div class="role-icon">🎟️</div>
            <div class="role-label">Attendee</div>
        </div>
        <div class="role-card" id="roleOrganizer" onclick="selectRole('organizer')">
            <div class="role-icon">🏢</div>
            <div class="role-label">Organizer</div>
        </div>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••"/>
        </div>
        <button class="btn-auth" onclick="doLogin()">Login →</button>
        <div class="err-msg" id="loginErr"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none;">
        <div class="name-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="regFirst" placeholder="Ravi"/>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="regLast" placeholder="Kumar"/>
            </div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="you@email.com"/>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" id="regLocation" placeholder="Enter location (e.g. Benz Circle, Vijayawada)"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min 6 characters"/>
        </div>
        <button class="btn-auth" onclick="doRegister()">Create Account →</button>
        <div class="err-msg" id="registerErr"></div>
    </div>

    <div class="back-link"><a href="index.html">← Back to Home</a></div>
</div>

<script>
let selectedRole = 'attendee';

function selectRole(role) {
    selectedRole = role;
    document.getElementById('roleAttendee').classList.toggle('selected', role === 'attendee');
    document.getElementById('roleOrganizer').classList.toggle('selected', role === 'organizer');
}

function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').style.display    = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none'  : 'block';
}

async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const err      = document.getElementById('loginErr');
    if (!email || !password) { showErr(err, 'Please fill all fields.'); return; }

    try {
        const res  = await fetch('http://127.0.0.1:5000/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password, role: selectedRole })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('eventhub_user', JSON.stringify(data.user));
            localStorage.setItem('eventhub_visited', '1');
            window.location.href = data.user.role === 'organizer' ? 'organizer.html' : 'index.html';
        } else {
            showErr(err, data.message || 'Login failed.');
        }
    } catch {
        // Offline fallback
        const users = JSON.parse(localStorage.getItem('eventhub_local_users') || '[]');
        const user  = users.find(u => u.email === email && u.password === password && u.role === selectedRole);
        if (user) {
            localStorage.setItem('eventhub_user', JSON.stringify(user));
            localStorage.setItem('eventhub_visited', '1');
            window.location.href = user.role === 'organizer' ? 'organizer.html' : 'index.html';
        } else {
            showErr(err, 'Invalid credentials. (Server offline — check Flask is running)');
        }
    }
}

async function doRegister() {
    const firstName   = document.getElementById('regFirst').value.trim();
    const lastName    = document.getElementById('regLast').value.trim();
    const email       = document.getElementById('regEmail').value.trim();
    const location    = document.getElementById('regLocation').value.trim();
    const password    = document.getElementById('regPassword').value;
    const err         = document.getElementById('registerErr');

    if (!firstName || !email || !password) { showErr(err, 'Please fill required fields.'); return; }
    if (password.length < 6)               { showErr(err, 'Password must be at least 6 characters.'); return; }

    const userData = { firstName, lastName, email, location, password, role: selectedRole };

    try {
        const res  = await fetch('http://127.0.0.1:5000/register', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(userData)
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('eventhub_user', JSON.stringify(data.user));
            localStorage.setItem('eventhub_visited', '1');
            window.location.href = selectedRole === 'organizer' ? 'organizer.html' : 'index.html';
        } else {
            if (data.message === 'Email already registered.') {
                showErr(err, 'Email already registered. Please Login.');
                setTimeout(() => switchTab('login'), 1500);
            } else {
                showErr(err, data.message || 'Registration failed.');
            }
        }
    } catch {
        // Offline fallback — save locally
        const users = JSON.parse(localStorage.getItem('eventhub_local_users') || '[]');
        if (users.find(u => u.email === email)) { 
            showErr(err, 'Email already registered. Please Login.'); 
            setTimeout(() => switchTab('login'), 1500);
            return; 
        }
        const user = { ...userData, id: 'local_' + Date.now() };
        users.push(user);
        localStorage.setItem('eventhub_local_users', JSON.stringify(users));
        const safeUser = { ...user }; delete safeUser.password;
        localStorage.setItem('eventhub_user', JSON.stringify(safeUser));
        localStorage.setItem('eventhub_visited', '1');
        window.location.href = selectedRole === 'organizer' ? 'organizer.html' : 'index.html';
    }
}

function showErr(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>
