<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventHub | Browse Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
body { font-family: 'DM Sans', sans-serif; }

.page-header {
  padding: 100px 24px 40px;
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 20px;
}
.page-header-left h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800; line-height: 1.1;
}
.page-header-left p { color: var(--text3); font-size: 14px; margin-top: 6px; }
.result-count {
  font-size: 13px; color: var(--text3);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 30px; padding: 8px 18px;
}

/* SEARCH + FILTER BAR */
.events-toolbar {
  padding: 0 24px 24px;
  max-width: 1200px; margin: 0 auto;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.events-search {
  flex: 1; min-width: 220px;
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid var(--border2);
  border-radius: 16px; padding: 13px 18px;
  transition: border-color 0.2s;
}
.events-search:focus-within { border-color: var(--accent); }
.events-search input {
  flex:1; background:none; border:none; color:var(--text);
  font-size:14px; outline:none; font-family:'DM Sans',sans-serif;
}
.events-search input::placeholder { color:var(--text3); }

.cat-scroll {
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; padding-bottom: 4px; flex-wrap: nowrap;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-tag {
  flex-shrink: 0; padding: 9px 18px;
  border-radius: 30px; border: 1.5px solid var(--border);
  background: transparent; color: var(--text3);
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.cat-tag:hover { border-color: var(--accent); color: var(--accent); }
.cat-tag.active {
  background: var(--accent); border-color: var(--accent);
  color: #fff; box-shadow: 0 4px 16px rgba(255,107,53,0.3);
}

/* SORT ROW */
.sort-row {
  padding: 0 24px 20px;
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.view-toggle { display: flex; gap: 6px; }
.view-btn {
  width:38px; height:38px; border-radius:10px;
  background:rgba(255,255,255,0.05); border:1.5px solid var(--border);
  color:var(--text3); font-size:16px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center;
}
.view-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(255,107,53,0.08); }
.sort-select {
  background:rgba(255,255,255,0.05); border:1.5px solid var(--border);
  color:var(--text); border-radius:10px; padding:8px 14px;
  font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; outline:none;
}

/* EVENTS GRID */
.events-container {
  padding: 0 24px 20px;
  max-width: 1200px; margin: 0 auto;
}
.ev-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 20px;
}
.ev-list { display: flex; flex-direction: column; gap: 14px; }

/* GRID CARD */
.ev-card {
  background: linear-gradient(160deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: 22px; overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
  position: relative;
}
.ev-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,107,53,0.12);
}
.ev-card-img {
  position: relative; height: 190px; overflow: hidden;
  background: linear-gradient(135deg, #1a1040, #0d2b3e);
}
.ev-card-img img {
  width:100%; height:100%; object-fit:cover;
  transition: transform 0.5s;
}
.ev-card:hover .ev-card-img img { transform: scale(1.08); }
.ev-card-img-overlay {
  position:absolute; inset:0;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
}
.ev-fav-btn {
  position: absolute; top:12px; right:12px;
  width:34px; height:34px;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(8px);
  border:none; border-radius:10px; font-size:14px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: all 0.2s; z-index:2;
}
.ev-fav-btn:hover { background:rgba(247,37,133,0.4); transform:scale(1.1); }
.ev-fav-btn.faved { background:rgba(247,37,133,0.5); }
.ev-sold-badge {
  position:absolute; top:12px; left:12px;
  background:rgba(255,71,87,0.9); color:#fff;
  font-size:10px; font-weight:800; padding:4px 10px; border-radius:20px;
  letter-spacing:0.5px;
}
.ev-card-body { padding: 18px; }
.ev-cat-tag {
  display:inline-block; padding:4px 12px;
  background:rgba(255,107,53,0.1); color:var(--accent);
  border:1px solid rgba(255,107,53,0.22);
  border-radius:30px; font-size:10px; font-weight:800;
  letter-spacing:0.8px; text-transform:uppercase; margin-bottom:10px;
}
.ev-card-title {
  font-family:'Syne',sans-serif;
  font-size:16px; font-weight:800; line-height:1.3; margin-bottom:10px;
}
.ev-card-meta { font-size:12px; color:var(--text3); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.ev-card-footer {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:14px; padding-top:14px;
  border-top:1px solid var(--border);
}
.ev-card-price {
  font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
  background:linear-gradient(135deg,#ff6b35,#f72585);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.ev-book-btn2 {
  padding:10px 20px;
  background:linear-gradient(135deg,#ff6b35,#f72585);
  color:#fff; border:none; border-radius:30px;
  font-size:12px; font-weight:800; cursor:pointer;
  box-shadow:0 4px 16px rgba(255,107,53,0.3);
  transition:all 0.2s; font-family:'DM Sans',sans-serif;
}
.ev-book-btn2:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,107,53,0.5); }
.ev-book-btn2:disabled { background:rgba(255,255,255,0.07); color:var(--text3); cursor:not-allowed; box-shadow:none; transform:none; }
.ev-seats { font-size:11px; color:var(--text3); margin-top:6px; }
.ev-seats.low { color:#ff6b35; }

/* LIST CARD */
.ev-list-card {
  display:flex; gap:16px; align-items:center;
  background:rgba(255,255,255,0.03); border:1px solid var(--border);
  border-radius:18px; padding:16px 18px;
  cursor:pointer; transition:all 0.25s;
}
.ev-list-card:hover { border-color:rgba(255,107,53,0.3); background:rgba(255,107,53,0.04); transform:translateX(4px); }
.ev-list-thumb {
  width:80px; height:80px; border-radius:14px; overflow:hidden;
  flex-shrink:0; background:var(--surface2);
}
.ev-list-thumb img { width:100%; height:100%; object-fit:cover; }
.ev-list-info { flex:1; }
.ev-list-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin-bottom:4px; }
.ev-list-meta { font-size:12px; color:var(--text3); margin-bottom:2px; }
.ev-list-price {
  font-family:'Syne',sans-serif; font-size:18px; font-weight:800;
  background:linear-gradient(135deg,#ff6b35,#f72585);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  white-space:nowrap;
}

/* EMPTY STATE */
.empty-state {
  text-align:center; padding:80px 20px;
  color:var(--text3);
}
.empty-state .icon { font-size:48px; margin-bottom:16px; }
.empty-state h3 { font-family:'Syne',sans-serif; font-size:20px; color:var(--text2); margin-bottom:8px; }
</style>
</head>
<body>
<div id="starfield"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<!-- MODALS -->
<div class="modal-overlay" id="bookingModal">
  <div class="modal-box">
    <div class="modal-icon">🎟️</div>
    <h2>Confirm Booking</h2>
    <div class="modal-event-info" id="modalEventInfo"></div>
    <div class="modal-price" id="modalPrice"></div>
    <div class="modal-actions">
      <button class="btn-confirm" onclick="confirmBooking()">Confirm & Book</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="successModal">
  <div class="modal-box">
    <div style="font-size:60px;margin-bottom:12px;">✅</div>
    <h2>Booking Confirmed!</h2>
    <div class="ticket-card" id="ticketPreview"></div>
    <button class="btn-confirm" onclick="closeSuccess()">Done</button>
  </div>
</div>
<div class="modal-overlay" id="favsPanel">
  <div class="modal-box" style="max-width:560px;max-height:80vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>❤️ My Favourites</h2>
      <button onclick="closeFavs()" style="background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;">✕</button>
    </div>
    <div id="favsContent"></div>
  </div>
</div>
<div class="modal-overlay" id="notifPanel">
  <div class="modal-box" style="max-width:420px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>🔔 Notifications</h2>
      <button onclick="closeNotif()" style="background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;">✕</button>
    </div>
    <div id="notifContent"></div>
  </div>
</div>
<div class="modal-overlay" id="ticketsPanel">
  <div class="modal-box" style="max-width:560px;max-height:80vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>🎟️ My Tickets</h2>
      <button onclick="closeTickets()" style="background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;">✕</button>
    </div>
    <div id="ticketsContent"></div>
  </div>
</div>
<div class="modal-overlay" id="profilePanel">
  <div class="modal-box" style="max-width:420px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>👤 My Account</h2>
      <button onclick="closeProfile()" style="background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;">✕</button>
    </div>
    <div id="profileContent"></div>
  </div>
</div>

<!-- HEADER -->
<header class="main-header">
  <div class="header-left">
    <a href="index.html" class="logo-text" style="text-decoration:none;">EventHub</a>
    <div class="location-block">
      <span>📍</span>
      <div>
        <div class="loc-label">Location</div>
        <div class="loc-city">Vijayawada, AP ▾</div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn notif-wrap" onclick="openNotif()">
      🔔<span class="notif-badge" id="notifBadge" style="display:none">0</span>
    </button>
    <button class="icon-btn fav-wrap" onclick="openFavs()">
      🤍<span class="fav-badge" id="favBadge" style="display:none">0</span>
    </button>
    <div id="authBtn"></div>
  </div>
</header>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-left">
    <h1>Browse All Events 🎪</h1>
    <p>Find your next unforgettable experience</p>
  </div>
  <div class="result-count" id="resultCount">12 events found</div>
</div>

<!-- TOOLBAR -->
<div class="events-toolbar">
  <div class="events-search">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Search events, venues..." oninput="applyFilters()"/>
  </div>
</div>
<div style="padding:0 24px 16px; max-width:1200px; margin:0 auto;">
  <div class="cat-scroll" id="catScroll">
    <button class="cat-tag active" data-cat="all" onclick="setCat('all',this)">All Events</button>
    <button class="cat-tag" data-cat="music" onclick="setCat('music',this)">🎵 Music</button>
    <button class="cat-tag" data-cat="jazz" onclick="setCat('jazz',this)">🎷 Jazz</button>
    <button class="cat-tag" data-cat="hiphop" onclick="setCat('hiphop',this)">🎤 Hip-Hop</button>
    <button class="cat-tag" data-cat="classical" onclick="setCat('classical',this)">🎻 Classical</button>
    <button class="cat-tag" data-cat="tech" onclick="setCat('tech',this)">💻 Tech</button>
    <button class="cat-tag" data-cat="food" onclick="setCat('food',this)">🍕 Food</button>
    <button class="cat-tag" data-cat="sports" onclick="setCat('sports',this)">⚽ Sports</button>
  </div>
</div>

<!-- SORT ROW -->
<div class="sort-row">
  <div class="view-toggle">
    <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid">⊞</button>
    <button class="view-btn" id="listBtn" onclick="setView('list')" title="List">☰</button>
  </div>
  <select class="sort-select" id="sortSelect" onchange="applyFilters()">
    <option value="default">Sort: Default</option>
    <option value="price-asc">Price: Low to High</option>
    <option value="price-desc">Price: High to Low</option>
    <option value="name">Name A-Z</option>
  </select>
</div>

<!-- EVENTS DISPLAY -->
<div class="events-container">
  <div class="ev-grid" id="eventsGrid"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav" onclick="window.location.href='index.html'">
    <span class="bicon">🏠</span><span class="blabel">Home</span>
  </button>
  <button class="bnav active" onclick="window.location.href='events.html'">
    <span class="bicon">🎪</span><span class="blabel">Events</span>
  </button>
  <button class="bnav" onclick="openFavs()">
    <span class="bicon" style="position:relative;">🤍<span class="bnav-badge" id="bnavFavBadge" style="display:none"></span></span>
    <span class="blabel">Favourites</span>
  </button>
  <button class="bnav" onclick="openTickets()">
    <span class="bicon">🎟️</span><span class="blabel">Tickets</span>
  </button>
  <button class="bnav" onclick="goToProfile()">
    <div class="bnav-avatar" id="bnavAvatar">👤</div>
    <span class="blabel">Profile</span>
  </button>
</nav>

<div style="height:90px"></div>
<script src="script.js"></script>
<script>
(function(){
  const sf=document.getElementById("starfield");
  if(!sf)return;
  for(let i=0;i<50;i++){
    const s=document.createElement("div");s.className="star-dot";
    const size=Math.random()*1.5+0.5;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--dl:${(Math.random()*5).toFixed(1)}s;--lo:${(Math.random()*0.15+0.05).toFixed(2)};opacity:${(Math.random()*0.15+0.05).toFixed(2)};`;
    sf.appendChild(s);
  }
})();

let currentCat = 'all';
let currentView = 'grid';

// Check URL param for category
const urlCat = new URLSearchParams(window.location.search).get('cat');
if (urlCat) { currentCat = urlCat; }

function setCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  applyFilters();
}

function setView(view) {
  currentView = view;
  document.getElementById('gridBtn').classList.toggle('active', view==='grid');
  document.getElementById('listBtn').classList.toggle('active', view==='list');
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let list = [...ALL_EVENTS];

  if (currentCat !== 'all') list = list.filter(e => e.category === currentCat);
  if (search) list = list.filter(e => e.title.toLowerCase().includes(search) || e.location.toLowerCase().includes(search));

  if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
  else if (sort === 'name') list.sort((a,b) => a.title.localeCompare(b.title));

  document.getElementById('resultCount').textContent = `${list.length} event${list.length!==1?'s':''} found`;

  const container = document.getElementById('eventsGrid');
  if (!list.length) {
    container.className = '';
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>No events found</h3><p>Try a different search or category</p></div>`;
    return;
  }

  if (currentView === 'grid') {
    container.className = 'ev-grid';
    container.innerHTML = list.map(ev => makeEvCard(ev)).join('');
  } else {
    container.className = 'ev-list';
    container.innerHTML = list.map(ev => makeEvListCard(ev)).join('');
  }
}

function makeEvCard(ev) {
  const isFav = getFavs().includes(ev.id);
  const full = isSoldOut(ev);
  const left = seatsLeft(ev);
  return `
    <div class="ev-card">
      <div class="ev-card-img">
        <img src="${ev.image}" alt="${ev.title}" onerror="this.style.display='none'"/>
        <div class="ev-card-img-overlay"></div>
        ${full ? '<div class="ev-sold-badge">SOLD OUT</div>' : ''}
        <button class="ev-fav-btn ${isFav?'faved':''}" onclick="toggleFav(${ev.id},this)">${isFav?'❤️':'🤍'}</button>
      </div>
      <div class="ev-card-body">
        <div class="ev-cat-tag">${ev.category}</div>
        <div class="ev-card-title">${ev.title}</div>
        <div class="ev-card-meta">📅 ${ev.date} &nbsp;·&nbsp; ${ev.time}</div>
        <div class="ev-card-meta">📍 ${ev.location.split(',')[0]}</div>
        <div class="ev-seats ${left < 20 && !full ? 'low' : ''}">
          ${full ? '🔴 Sold out' : left < 20 ? `🟠 Only ${left} seats left!` : `🟢 ${left} / ${ev.capacity} seats`}
        </div>
        <div class="ev-card-footer">
          <div class="ev-card-price">₹${ev.price}</div>
          <button class="ev-book-btn2" onclick="openBooking(${ev.id})" ${full?'disabled':''}>
            ${full ? 'Full' : 'Book Now'}
          </button>
        </div>
      </div>
    </div>`;
}

function makeEvListCard(ev) {
  const full = isSoldOut(ev);
  return `
    <div class="ev-list-card" onclick="openBooking(${ev.id})">
      <div class="ev-list-thumb">
        <img src="${ev.image}" alt="${ev.title}" onerror="this.style.display='none'"/>
      </div>
      <div class="ev-list-info">
        <div class="ev-list-title">${ev.title}</div>
        <div class="ev-list-meta">📅 ${ev.date} · ${ev.time}</div>
        <div class="ev-list-meta">📍 ${ev.location.split(',')[0]}</div>
      </div>
      <div style="text-align:right; flex-shrink:0;">
        <div class="ev-list-price">₹${ev.price}</div>
        <div style="font-size:11px; color:${full?'#ff4757':'var(--text3)'}; margin-top:4px;">${full?'Sold Out':'Available'}</div>
      </div>
    </div>`;
}

window.onload = function() {
  updateAuthUI();
  updateBadges();
  // activate correct cat pill from URL
  if (urlCat) {
    document.querySelectorAll('.cat-tag').forEach(t => {
      t.classList.toggle('active', t.dataset.cat === urlCat);
    });
  }
  applyFilters();
};
</script>
</body>
</html>
