<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventHub | My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.page-wrap { max-width: 560px; margin: 0 auto; padding: 90px 20px 100px; }

/* HERO AVATAR */
.profile-hero {
  text-align: center; padding: 32px 20px 28px;
  background: linear-gradient(160deg, rgba(123,97,255,0.1), rgba(0,201,167,0.06));
  border: 1px solid rgba(123,97,255,0.15);
  border-radius: 28px; margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.profile-hero::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:200px; height:200px; border-radius:50%;
  background: radial-gradient(circle, rgba(123,97,255,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.avatar-ring {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, #7b61ff, #00c9a7);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 36px; font-weight: 800; color: #fff;
  margin: 0 auto 16px;
  box-shadow: 0 0 0 4px rgba(123,97,255,0.2), 0 8px 32px rgba(123,97,255,0.3);
}
.profile-name {
  font-family: 'Syne', sans-serif;
  font-size: 24px; font-weight: 800; margin-bottom: 4px;
}
.profile-email { font-size: 13px; color: var(--text3); margin-bottom: 10px; }
.profile-role-badge {
  display: inline-block; padding: 5px 16px;
  background: rgba(0,201,167,0.1); border: 1px solid rgba(0,201,167,0.25);
  border-radius: 30px; font-size: 11px; font-weight: 700; color: #00c9a7;
  letter-spacing: 1px; text-transform: uppercase;
}
.profile-institution { font-size: 12px; color: var(--text3); margin-top: 8px; }

/* STATS */
.profile-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-bottom: 20px;
}
.ps-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 18px 12px; text-align: center;
  cursor: pointer; transition: all 0.2s;
}
.ps-card:hover { border-color: var(--accent); transform: translateY(-3px); }
.ps-num {
  font-family: 'Syne', sans-serif;
  font-size: 28px; font-weight: 800;
  background: linear-gradient(135deg, #ff6b35, #f72585);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.ps-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 600; }

/* MENU LIST */
.menu-section { margin-bottom: 16px; }
.menu-label { font-size: 11px; color: var(--text3); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; padding-left: 4px; }
.menu-list { display: flex; flex-direction: column; gap: 8px; }
.menu-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 18px;
  cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text);
}
.menu-item:hover { border-color: rgba(255,107,53,0.3); background: rgba(255,107,53,0.04); transform: translateX(4px); }
.menu-icon { font-size: 20px; width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.menu-text { flex: 1; }
.menu-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.menu-sub { font-size: 12px; color: var(--text3); }
.menu-arrow { color: var(--text3); font-size: 16px; }
.menu-badge { background: var(--pink); color: #fff; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; }

/* LOGOUT */
.btn-logout-full {
  width: 100%; padding: 15px;
  background: rgba(255,71,87,0.08); border: 1.5px solid rgba(255,71,87,0.25);
  color: #ff4757; border-radius: 16px;
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; margin-top: 8px;
}
.btn-logout-full:hover { background: rgba(255,71,87,0.15); border-color: #ff4757; }

/* NOT LOGGED IN */
.auth-prompt {
  text-align: center; padding: 60px 20px;
}
.auth-prompt .icon { font-size: 60px; margin-bottom: 16px; }
.auth-prompt h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.auth-prompt p { color: var(--text3); font-size: 14px; margin-bottom: 28px; }
.btn-go-login {
  display: inline-block; padding: 14px 40px;
  background: linear-gradient(135deg, #ff6b35, #f72585);
  color: #fff; border-radius: 50px;
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700;
  box-shadow: 0 8px 28px rgba(255,107,53,0.35);
  text-decoration: none; transition: all 0.2s;
}
.btn-go-login:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div id="starfield"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<!-- HEADER -->
<header class="main-header">
  <div class="header-left">
    <a href="index.html" class="logo-text" style="text-decoration:none">EventHub</a>
  </div>
  <div class="header-right">
    <div id="authBtn"></div>
  </div>
</header>

<!-- CONTENT -->
<div class="page-wrap" id="pageContent">
  <!-- filled by JS -->
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav" onclick="location.href='index.html'">
    <span class="bicon">🏠</span><span class="blabel">Home</span>
  </button>
  <button class="bnav" onclick="location.href='events.html'">
    <span class="bicon">🎪</span><span class="blabel">Events</span>
  </button>
  <button class="bnav" onclick="location.href='favourites.html'">
    <span class="bicon">🤍</span><span class="blabel">Favourites</span>
  </button>
  <button class="bnav" onclick="location.href='tickets.html'">
    <span class="bicon">🎟️</span><span class="blabel">Tickets</span>
  </button>
  <button class="bnav active" onclick="location.href='profile.html'">
    <div class="bnav-avatar" id="bnavAvatar">👤</div>
    <span class="blabel">Profile</span>
  </button>
</nav>

<script src="script.js"></script>
<script>
(function(){
  const sf=document.getElementById("starfield");if(!sf)return;
  for(let i=0;i<60;i++){const s=document.createElement("div");s.className="star-dot";
  const z=Math.random()*1.5+0.5;
  s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--dl:${(Math.random()*5).toFixed(1)}s;--lo:${(Math.random()*0.15+0.04).toFixed(2)};opacity:${(Math.random()*0.15+0.04).toFixed(2)};`;
  sf.appendChild(s);}
})();

function render() {
  const user = getUser();
  const content = document.getElementById('pageContent');

  if (!user) {
    content.innerHTML = `
      <div class="auth-prompt">
        <div class="icon">🔐</div>
        <h2>Sign In to Continue</h2>
        <p>View your profile, tickets, and favourites</p>
        <a href="login.html" class="btn-go-login">Login / Register →</a>
      </div>`;
    return;
  }

  const initials = ((user.firstName||'')[0]||(user.email[0]||'U')).toUpperCase();
  const tickets = getTickets();
  const favs = getFavs();

  // Update bottom nav avatar
  const av = document.getElementById('bnavAvatar');
  if(av){av.textContent=initials;av.style.background='linear-gradient(135deg,#7b61ff,#00c9a7)';}

  content.innerHTML = `
    <!-- HERO -->
    <div class="profile-hero">
      <div class="avatar-ring">${initials}</div>
      <div class="profile-name">${user.firstName||''} ${user.lastName||''}</div>
      <div class="profile-email">${user.email}</div>
      ${user.institution ? `<div class="profile-institution">🏫 ${user.institution}</div>` : ''}
      <div style="margin-top:10px;">
        <span class="profile-role-badge">${user.role==='organizer'?'🏢 Organizer':'🎟️ Attendee'}</span>
      </div>
    </div>

    <!-- STATS -->
    <div class="profile-stats">
      <div class="ps-card" onclick="location.href='tickets.html'">
        <div class="ps-num">${tickets.length}</div>
        <div class="ps-lbl">Tickets</div>
      </div>
      <div class="ps-card" onclick="location.href='favourites.html'">
        <div class="ps-num">${favs.length}</div>
        <div class="ps-lbl">Favourites</div>
      </div>
      <div class="ps-card">
        <div class="ps-num">₹${tickets.reduce((s,t)=>s+(t.price||0),0).toLocaleString('en-IN')}</div>
        <div class="ps-lbl">Spent</div>
      </div>
    </div>

    <!-- MENU -->
    <div class="menu-section">
      <div class="menu-label">My Activity</div>
      <div class="menu-list">
        <a href="tickets.html" class="menu-item">
          <div class="menu-icon">🎟️</div>
          <div class="menu-text">
            <div class="menu-title">My Tickets</div>
            <div class="menu-sub">${tickets.length} booking${tickets.length!==1?'s':''}</div>
          </div>
          <span class="menu-arrow">›</span>
        </a>
        <a href="favourites.html" class="menu-item">
          <div class="menu-icon">❤️</div>
          <div class="menu-text">
            <div class="menu-title">Favourites</div>
            <div class="menu-sub">${favs.length} saved event${favs.length!==1?'s':''}</div>
          </div>
          <span class="menu-arrow">›</span>
        </a>
        ${user.role==='organizer' ? `
        <a href="organizer.html" class="menu-item">
          <div class="menu-icon">🏢</div>
          <div class="menu-text">
            <div class="menu-title">Organizer Dashboard</div>
            <div class="menu-sub">Manage your events</div>
          </div>
          <span class="menu-arrow">›</span>
        </a>` : ''}
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-label">Account</div>
      <div class="menu-list">
        <div class="menu-item">
          <div class="menu-icon">📍</div>
          <div class="menu-text">
            <div class="menu-title">Location</div>
            <div class="menu-sub">Vijayawada, Andhra Pradesh</div>
          </div>
        </div>
        <div class="menu-item">
          <div class="menu-icon">🔔</div>
          <div class="menu-text">
            <div class="menu-title">Notifications</div>
            <div class="menu-sub">Event reminders enabled</div>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-logout-full" onclick="doLogout()">🚪 Logout</button>
  `;
}

function doLogout() {
  localStorage.removeItem('eventhub_user');
  location.href = 'index.html';
}

window.onload = function() { updateAuthUI(); render(); };
</script>
</body>
</html>
